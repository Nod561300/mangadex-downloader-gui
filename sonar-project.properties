# sonar-project.properties — mangadex-downloader-gui
# วางไฟล์นี้ไว้ที่ root ของ repo (ระดับเดียวกับ package.json)

sonar.projectKey=mangadex-downloader-gui
sonar.projectName=MangaDex Downloader GUI
sonar.projectVersion=0.1.0

# โฟลเดอร์ source: frontend (Vue/TS) + backend (Rust)
sonar.sources=src,src-tauri/src
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,**/*.lock,**/pnpm-lock.yaml,src-tauri/icons/**,public/**

# ให้ Sonar เข้าใจ TypeScript config ของ frontend
sonar.typescript.tsconfigPaths=tsconfig.json

# ถ้ามี test + coverage ในอนาคต (vitest --coverage สร้าง lcov.info)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# นำเข้าผลตรวจจาก cargo clippy ผ่าน Generic Issue Import Format
# (ไฟล์นี้สร้างจาก scripts/clippy-to-sonar.js ใน pipeline)
sonar.externalIssuesReportPaths=clippy-sonar-report.json

sonar.sourceEncoding=UTF-8
